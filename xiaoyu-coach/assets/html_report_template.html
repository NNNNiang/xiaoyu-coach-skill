<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{REPORT_TITLE}}</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #64717f;
      --line: #d8e0e7;
      --panel: #f6f8fa;
      --accent: #236b5e;
      --soft: #edf6f2;
      --warn: #8a5a18;
      --warn-soft: #fff8ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: #fff;
      line-height: 1.72;
    }
    main {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }
    header {
      border-bottom: 2px solid var(--ink);
      padding-bottom: 18px;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(26px, 6vw, 40px);
      line-height: 1.16;
      letter-spacing: 0;
    }
    h2 {
      margin: 34px 0 12px;
      padding-top: 4px;
      border-top: 1px solid var(--line);
      font-size: 24px;
      line-height: 1.28;
    }
    h3 {
      margin: 22px 0 8px;
      font-size: 19px;
      line-height: 1.32;
    }
    p { margin: 8px 0 12px; }
    ul { padding-left: 22px; }
    li { margin: 4px 0; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .meta div { flex: 1 1 300px; }
    .score {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      margin: 4px 0 12px;
      background: var(--soft);
      border: 1px solid #c6ddd5;
      border-radius: 8px;
      color: var(--accent);
      font-weight: 800;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 18px;
      font-size: 15px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
    }
    th { background: var(--panel); }
    img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 0;
    }
    figure { margin: 0 0 12px; }
    figcaption {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }
    .callout {
      padding: 14px 16px;
      border-left: 4px solid var(--accent);
      background: var(--soft);
      border-radius: 6px;
      margin: 14px 0;
    }
    .warn {
      padding: 14px 16px;
      border-left: 4px solid var(--warn);
      background: var(--warn-soft);
      border-radius: 6px;
      margin: 14px 0;
    }
    .action-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin: 16px 0;
      overflow: hidden;
    }
    .action-card h3 {
      margin: 0;
      padding: 14px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .action-body {
      display: flex;
      gap: 16px;
      align-items: start;
      padding: 14px 16px 16px;
    }
    .action-media {
      flex: 1 1 54%;
      min-width: 0;
    }
    .action-text {
      flex: 1 1 320px;
    }
    .action-text p:first-child {
      margin-top: 0;
    }
    @media (max-width: 680px) {
      main { width: min(100% - 20px, 1040px); padding-top: 20px; }
      .meta { display: block; }
      .meta div { margin: 4px 0; }
      .action-body { display: block; padding: 12px; }
      .action-media { margin-bottom: 12px; }
      table { font-size: 14px; }
      th, td { padding: 8px 9px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>{{REPORT_TITLE}}</h1>
      <div class="meta">{{META_BLOCK}}</div>
    </header>
    <section><h2>总评</h2>{{OVERALL}}</section>
    <section><h2>安全优先级</h2>{{SAFETY_TABLE}}</section>
    <section><h2>本次动作内容</h2>{{ACTION_TABLE}}</section>
    <section><h2>训练量与机位对比</h2>{{VOLUME_CAMERA}}</section>
    <section><h2>重点动作图文复盘</h2>{{ACTION_CARDS}}</section>
    <section><h2>下次训练重点</h2>{{NEXT_FOCUS}}</section>
    <section><h2>教练收束</h2><div class="warn">{{COACH_CLOSE}}</div></section>
  </main>
</body>
</html>
